# eget.toml — declarative binary tool management
# Versions pinned to known-good releases. Update with: eget --download-all
# To bump versions, update the tag values below.

[global]
target = "~/.local/bin"
upgrade_only = false

["starship/starship"]
tag = "v1.24.2"
asset_filters = ["gnu", ".tar.gz"]

["eza-community/eza"]
tag = "v0.23.4"
asset_filters = ["gnu", ".tar.gz"]

["junegunn/fzf"]
tag = "v0.67.0"

["ajeetdsouza/zoxide"]
tag = "v0.9.9"

["dandavison/delta"]
tag = "0.18.2"
asset_filters = [".tar.gz", "gnu"]

["aristocratos/btop"]
tag = "v1.4.6"

["charmbracelet/glow"]
tag = "v2.1.1"
asset_filters = [".tar.gz", "^sbom"]

["jesseduffield/lazygit"]
tag = "v0.59.0"

["astral-sh/uv"]
tag = "0.10.0"
asset_filters = [".tar.gz", "gnu"]

["chmln/sd"]
tag = "v1.1.0"
asset_filters = ["x86_64-unknown-linux-musl"]

["koalaman/shellcheck"]
tag = "v0.11.0"
asset_filters = [".linux.x86_64.tar.xz"]

["openai/codex"]
tag = "rust-v0.141.0"
# "codex-x86_64" is NOT a substring of "codex-app-server-x86_64", so this pair
# uniquely selects the main CLI tarball among the release's many musl binaries.
asset_filters = ["codex-x86_64-unknown-linux-musl", ".tar.gz"]
# The archive's binary is named codex-x86_64-unknown-linux-musl; a file-path
# target renames it to plain `codex` on install.
target = "~/.local/bin/codex"

["mame/wsl2-ssh-agent"]
tag = "v0.9.7"
# Release ships bare binaries: wsl2-ssh-agent (x86_64) and wsl2-ssh-agent-arm64.
# "^arm64" drops the ARM asset; the remaining match is the x86_64 binary.
asset_filters = ["wsl2-ssh-agent", "^arm64"]
