# eget.toml — declarative binary tool management
# Versions pinned to known-good releases.
#
# upgrade_only=true makes `eget --download-all` idempotent: a tool already
# present at its pinned tag is skipped (eget compares the pinned release's date
# against the installed binary's mtime), so re-running setup.sh no longer
# re-downloads everything. To move to a newer release, bump its `tag` and
# re-run — the newer release date triggers the download. To force a clean
# re-download (repair or downgrade), use `./setup.sh --shell --force`, which
# clears the binaries first so eget fetches them fresh.

[global]
target = "~/.local/bin"
upgrade_only = true

["starship/starship"]
tag = "v1.24.2"
asset_filters = ["gnu", ".tar.gz"]

["eza-community/eza"]
tag = "v0.23.4"
asset_filters = ["gnu", ".tar.gz"]

["junegunn/fzf"]
tag = "v0.67.0"

["ajeetdsouza/zoxide"]
tag = "v0.9.9"

["dandavison/delta"]
tag = "0.18.2"
asset_filters = [".tar.gz", "gnu"]

["aristocratos/btop"]
tag = "v1.4.6"

["charmbracelet/glow"]
tag = "v2.1.1"
asset_filters = [".tar.gz", "^sbom"]

["jesseduffield/lazygit"]
tag = "v0.59.0"

["astral-sh/uv"]
tag = "0.10.0"
asset_filters = [".tar.gz", "gnu"]

["chmln/sd"]
tag = "v1.1.0"
asset_filters = ["x86_64-unknown-linux-musl"]

["koalaman/shellcheck"]
tag = "v0.11.0"
asset_filters = [".linux.x86_64.tar.xz"]

# NOTE: Codex is an "ai" tier tool and is intentionally NOT listed here. It is
# managed by installers/install-codex.sh (via eget-ai.toml) so that `--shell`'s
# `eget --download-all` never pulls it in — AI CLIs install only under --ai/--full.

["mame/wsl2-ssh-agent"]
tag = "v0.9.7"
# Release ships bare binaries: wsl2-ssh-agent (x86_64) and wsl2-ssh-agent-arm64.
# "^arm64" drops the ARM asset; the remaining match is the x86_64 binary.
asset_filters = ["wsl2-ssh-agent", "^arm64"]
