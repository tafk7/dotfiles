# Modern Tmux Configuration - Power User Setup
# Part of dotfiles - optimized for neovim/shell integration

# ==============================================================================
# Core Settings
# ==============================================================================

# Better terminal support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"    # True color support
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'  # Cursor shape support
set -ga terminal-overrides ',xterm*:khome=\EOH:kend=\EOF'  # Home/End (xterm sends \EOH/\EOF, tmux-256color expects \E[1~/\E[4~)
set -ga terminal-overrides ',xterm*:kDC5=\E[3;5~'        # Ctrl+Delete (forward delete-word)

# Extended key support (tmux 3.2+) — enables Ctrl+Shift differentiation
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Performance and behavior
set -sg escape-time 0                        # No delay for escape key (neovim)
set -g history-limit 2000                    # Low scrollback — prevents reflow lag on reattach with chatty panes
set -g display-time 4000                     # Status messages display longer
set -g status-interval 5                     # Refresh status bar every 5s
set -g focus-events on                       # Focus events for vim autoread
set -g aggressive-resize on                  # Resize to smallest client actually viewing

# Window and pane behavior
set -g base-index 1                          # Start windows at 1
setw -g pane-base-index 1                    # Start panes at 1
set -g renumber-windows on                   # Renumber windows when one is closed
setw -g automatic-rename on                  # Rename window to current program
set -g set-titles on                         # Set terminal title
set -g set-titles-string '#S: #W'           # Title format

# ==============================================================================
# Key Bindings — Prefix
# ==============================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ==============================================================================
# No-Prefix Bindings (left-hand optimized, instant)
#
# Layout mirrors left half of split keyboard:
#   Alt+Shift+ESDF   = pane navigate (arrow diamond)
#   Alt+1–5          = window jump
#   Alt+Shift+Q/W/A/T/X/G = window/pane operations
#
# Every no-prefix binding also has a C-a prefix mirror for laptops.
# ==============================================================================

# Pane navigation — Alt+Shift+ESDF (no prefix) + C-a mirror
bind -n M-E select-pane -U
bind -n M-S select-pane -L
bind -n M-D select-pane -D
bind -n M-F select-pane -R

# Window jump — Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Window/pane operations — Alt+Shift+key (no prefix) + C-a mirror
bind -n M-Q last-window                      # Toggle last window
bind -n M-W choose-tree -Zw                  # Window picker
bind -n M-A resize-pane -Z                   # Zoom pane toggle
bind -n M-T new-window -c "#{pane_current_path}"   # New window
bind -n M-X confirm-before -p "kill-pane? (y/n)" kill-pane  # Kill pane (with confirm)
bind -n M-G setw synchronize-panes \; display 'synchronize-panes #{?synchronize-panes,on,off}'

# ==============================================================================
# Prefix Bindings
# ==============================================================================

# Pane navigation — C-a + arrow (prefix mirror for laptop use)
bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R

# Pane resize — C-a + Shift+Arrow (repeatable)
bind -r S-Up resize-pane -U 5
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Right resize-pane -R 5

# Window/pane operations — C-a + key (mirrors no-prefix)
bind a resize-pane -Z                        # Zoom pane toggle
bind t new-window -c "#{pane_current_path}"  # New window
bind w choose-tree -Zw                       # Window picker
bind g setw synchronize-panes \; display 'synchronize-panes #{?synchronize-panes,on,off}'

# Splits (preserve current path)
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind b split-window -h -c "#{pane_current_path}"  # Left-hand alternative for h-split

# Window/session operations
bind c command-prompt "rename-window '%%'"    # Rename window
bind C new-session
bind x kill-window                           # Kill window (Alt+Shift+X kills pane)
bind e switch-client -n                      # Next session
bind E switch-client -p                      # Previous session
bind s choose-tree -Zs                       # Session chooser

# Pane operations
bind j command-prompt -p "join pane from:" "join-pane -s '%%'"
bind q display-panes -d 3000                 # Show pane numbers
bind Space next-layout
bind C-Space previous-layout

# Copy mode and clipboard
bind v copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind p paste-buffer
bind P run "xclip -o -sel clipboard | tmux load-buffer - ; tmux paste-buffer"

# Utility
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"
bind C-l send-keys 'C-l' \; run 'sleep 0.1' \; clear-history

# ==============================================================================
# Mouse Support
# ==============================================================================

set -g mouse on

# Mouse drag to copy
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# ==============================================================================
# Visual Styling - Dynamic Theme Loading
# ==============================================================================

# Source theme configuration if it exists
if-shell "test -f ~/.tmux/theme.conf" \
    "source-file ~/.tmux/theme.conf" \
    "source-file $DOTFILES_DIR/configs/themes/gruvbox/tmux.conf"

# ==============================================================================
# Status Bar Configuration
# ==============================================================================

set -g status-position bottom
set -g status-justify left

# Status bar length
set -g status-left-length 40
set -g status-right-length 80

# Status content defined in theme files
# Default status if theme doesn't define it
if-shell -b '[ -z "$status_left" ]' \
    "set -g status-left '#[bold]  #S │ '"

if-shell -b '[ -z "$status_right" ]' \
    "set -g status-right '#{user}@#h │ %a %b %d %H:%M '"

# Window status format
set -g window-status-format ' #I:#W#F '
set -g window-status-current-format ' #I:#W#F '
set -g window-status-separator ''

# ==============================================================================
# Activity and Monitoring
# ==============================================================================

# Disable activity monitoring (less noise)
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-bell off

