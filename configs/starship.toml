# Starship Configuration — palette-aware, dotfiles-managed
#
# This is a TEMPLATE. bin/theme-switcher generates generated/starship.toml
# from this file by substituting the __DOTFILES_PALETTE__ marker with the
# active theme name. STARSHIP_CONFIG (set in shell/env.sh) points starship
# at the generated file.
#
# Palette blocks live at the bottom of this file. To add a new theme,
# append its block below and ensure its shell.sh sets STARSHIP_PALETTE
# matching the [palettes.<name>] key (used by env.sh fallback only —
# the generated file pins the palette directly).

command_timeout = 1000
# DOTFILES_PALETTE_MARKER — substituted by theme-switcher into generated/starship.toml.
# Do not edit: change palette by switching themes (bin/theme-switcher <name>).
palette = "__DOTFILES_PALETTE__"

format = """
[╭─](bracket) $directory$git_branch$git_status$cmd_duration
[╰─](bracket_alt) $character"""

right_format = """$nodejs$python$docker_context$time"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"

[directory]
format = "[$path]($style) "
style = "blue bold"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"

[git_branch]
format = "on [$symbol$branch]($style) "
style = "purple"
symbol = " "
truncation_length = 20

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "red"
conflicted = "⚔️ "
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕"
untracked = "?"
stashed = "≡"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "yellow"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "
style = "green"
detect_extensions = ["js", "mjs", "cjs", "ts"]
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[python]
format = "[$symbol($version )]($style)"
symbol = " "
style = "yellow"
detect_extensions = ["py"]
detect_files = [".python-version", "requirements.txt", "setup.py", "pyproject.toml"]
detect_folders = []
python_binary = ["python3", "python"]

[docker_context]
format = "[$symbol$context]($style) "
symbol = " "
style = "blue"
only_with_files = true
detect_files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml"]

[time]
disabled = false
format = "[$time]($style)"
style = "fg_dim"
time_format = "%R"

[aws]
disabled = true

[gcloud]
disabled = true

[package]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[kotlin]
disabled = true

[scala]
disabled = true

[swift]
disabled = true

