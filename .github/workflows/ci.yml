name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check (bash -n) on every *.sh
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::bash -n syntax error"
              fail=1
            fi
          done < <(find . \
            -path ./.git -prune -o \
            -path ./.backups -prune -o \
            -path ./generated -prune -o \
            -name '*.sh' -type f -print0)
          # Entry files are sourced, not always *.sh — check them too.
          for f in entry/bash_profile entry/bash.sh entry/zsh.sh entry/profile.sh; do
            [[ -f "$f" ]] || continue
            if ! bash -n "$f"; then
              echo "::error file=$f::bash -n syntax error"
              fail=1
            fi
          done
          exit "$fail"

      - name: ShellCheck (warning+ severity)
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          ignore_paths: >-
            .git
            .backups
            generated
            .scratchpad
            .agents
            .claude

  structure:
    name: Structural smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Theme catalog parses
        run: |
          set -euo pipefail
          # `--list` walks every themes/<name>/meta.sh and prints the catalog.
          # If a theme dir is malformed (missing meta.sh / colors.sh / shell.sh),
          # this fails before any installation step.
          ./bin/theme-switcher --list

      - name: --help endpoints execute cleanly
        run: |
          set -euo pipefail
          ./setup.sh --help                 >/dev/null
          ./bin/theme-switcher --help       >/dev/null
          ./bin/check-updates --help        >/dev/null
          ./bin/diff-config --help          >/dev/null
          ./bin/uninstall-tool --help       >/dev/null

      - name: Cheatsheet TSV is well-formed
        run: |
          set -euo pipefail
          # Every non-comment, non-empty row must have exactly 4 fields
          # separated by U+2502 (│). Bad rows would silently break preview.
          bad=$(awk -F'│' '
            /^#/ || NF == 0 { next }
            NF != 4 { print FILENAME ":" NR ": expected 4 fields, got " NF; bad=1 }
            END { exit bad ? 1 : 0 }
          ' shell/shortcuts-index.tsv) || {
            echo "::error::Malformed cheatsheet rows:"
            echo "$bad"
            exit 1
          }

      - name: CONFIG_MAP source paths exist on disk
        run: |
          set -euo pipefail
          export DOTFILES_DIR="$PWD"
          # shellcheck disable=SC1091
          source lib/config.sh
          fail=0
          for key in "${!CONFIG_MAP[@]}"; do
            src=$(config_source_path "$key")
            if [[ ! -e "$src" ]]; then
              echo "::error::CONFIG_MAP[$key] points at missing source: $src"
              fail=1
            fi
          done
          exit "$fail"

  theme-cycle:
    name: Theme cycling smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cycle every theme via --init/apply
        run: |
          set -euo pipefail
          export DOTFILES_DIR="$PWD"
          # Discover themes the same way theme-switcher does: every dir
          # under themes/ that contains a meta.sh is a valid theme.
          themes=$(find themes -mindepth 2 -maxdepth 2 -name meta.sh \
            | sed 's|^themes/||; s|/meta.sh$||' | sort)
          [[ -z "$themes" ]] && { echo "no themes discovered"; exit 1; }
          for t in $themes; do
            echo "::group::Apply theme: $t"
            # Apply writes generated/theme.sh + per-tool artifacts. We don't
            # have the consumer tools (vim, btop, etc.) installed in CI, so
            # we just check the apply itself doesn't error and that it
            # produced a generated/theme.sh file referencing the theme.
            ./bin/theme-switcher "$t"
            grep -q "DOTFILES_THEME=\"$t\"" generated/theme.sh \
              || { echo "::error::theme.sh did not pin to $t"; exit 1; }
            echo "::endgroup::"
          done
          echo "All themes cycled successfully."

  install-test:
    name: Containerized install (--shell)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      # The structural jobs above never execute lib/install.sh. This one runs
      # the real installer in a clean container as a non-root sudo user — the
      # only job that exercises apt + eget + symlink + theme-init paths.
      - name: Bootstrap container (git, sudo, locales, non-root user)
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl wget git sudo locales lsb-release
          # setup.sh refuses to run as root, so install as an unprivileged user.
          useradd -m -s /bin/bash test
          echo 'test ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/test
          chmod 0440 /etc/sudoers.d/test

      - uses: actions/checkout@v4

      - name: Stage repo for the test user
        run: |
          set -euo pipefail
          cp -a "$GITHUB_WORKSPACE" /home/test/dotfiles
          chown -R test:test /home/test/dotfiles

      - name: Run the installer (--shell tier)
        run: |
          su - test <<'EOSU'
          set -euo pipefail
          cd ~/dotfiles
          ./setup.sh --shell --force --git-name "CI Bot" --git-email ci@example.com
          EOSU

      - name: Assert configs linked and shell-tier tools on PATH
        run: |
          su - test <<'EOSU'
          set -euo pipefail
          cd ~/dotfiles
          export DOTFILES_DIR="$PWD"
          # shellcheck disable=SC1091
          source lib/runtime.sh
          source lib/config.sh
          fail=0
          # Every CONFIG_MAP entry must resolve (reuses the repo's own data).
          for key in "${!CONFIG_MAP[@]}"; do
              mapping="${CONFIG_MAP[$key]}"
              target="${mapping%%:*}"
              type="${mapping##*:}"
              case "$type" in
                  symlink)
                      [[ -L "$target" ]] || { echo "::error::missing symlink: $target"; fail=1; } ;;
                  gitconfig)
                      if [[ ! -f "$target" ]] || grep -q "{{GIT_" "$target"; then
                          echo "::error::gitconfig not processed: $target"; fail=1
                      fi ;;
              esac
          done
          # Every shell-tier tool must be on PATH after install.
          for name in $(tools_for_tier shell); do
              bin="${TOOL_BINARY[$name]}"
              command -v "$bin" >/dev/null 2>&1 \
                || { echo "::error::shell-tier tool missing: $name ($bin)"; fail=1; }
          done
          [[ $fail -eq 0 ]] && echo "Install assertions passed."
          exit $fail
          EOSU

      - name: bin/verify (informational — full verify expects dev+ tiers)
        continue-on-error: true
        run: su - test -c 'cd ~/dotfiles && ./bin/verify'

  startup-benchmark:
    name: Shell startup benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hyperfine + zsh
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y hyperfine zsh

      - name: Install dotfiles (--shell, so tool-init runs realistically)
        run: ./setup.sh --shell --force --git-name "CI Bot" --git-email ci@example.com

      - name: Benchmark interactive startup
        run: |
          set -euo pipefail
          # The architecture is tuned for fast startup (lazy nvm, interactive-only
          # sourcing). Measure it so a regression (e.g. un-lazying nvm) is visible.
          hyperfine --warmup 5 --runs 50 --export-json /tmp/bench.json \
            --command-name 'bash -i' 'bash -i -c exit' \
            --command-name 'zsh -i'  'zsh -i -c exit'
          # Catastrophic-regression guard. Fine-grained history tracking would use
          # benchmark-action/github-action-benchmark (see yutkat/dotfiles); this
          # generous ceiling just keeps the job honest without runner-variance flakes.
          python3 - <<'PY'
          import json, sys
          ceiling = 1.0  # seconds
          status = 0
          for r in json.load(open('/tmp/bench.json'))['results']:
              mean = r['mean']
              print(f"{r['command']}: {mean*1000:.1f} ms "
                    f"(min {r['min']*1000:.1f}, max {r['max']*1000:.1f})")
              if mean > ceiling:
                  print(f"::error::{r['command']} mean {mean*1000:.0f} ms "
                        f"exceeds {ceiling*1000:.0f} ms ceiling")
                  status = 1
          sys.exit(status)
          PY
